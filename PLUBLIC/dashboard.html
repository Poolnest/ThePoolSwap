<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace - PoolSwap</title>
    <link rel="stylesheet" href="/CSS/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <h1>Marketplace</h1>
        <nav>
            <a href="dashboard.html">Marketplace</a>
            <a href="add-listing.html">Sell</a>
            <a href="favorites.html">Favorites</a>
            <a href="messages.html">Messages</a>
            <a href="donate.html">Donate</a>
            <a href="account.html">Account</a>
        </nav>
    </header>
 
    <div class="main-container">
        <!-- Map -->
        <div class="map-container">
            <div id="map"></div>
            <div class="filter-container">
                <form id="filterForm">
                    <label for="listingType">Listing Type:</label>
                    <select id="listingType" name="listingType">
                        <option value="all">All</option>
                        <option value="pool">Individual Pool</option>
                        <option value="route">Route</option>
                        <option value="business">Business</option>
                    </select>
 
                    <label for="priceRange">Price Range:</label>
                    <input type="text" id="priceRange" name="priceRange" placeholder="$ Min - $ Max">
 
                    <label for="city">City:</label>
                    <input type="text" id="city" name="city">
 
                    <button type="submit">Apply Filters</button>
                </form>
            </div>
        </div>
 
        <!-- Sidebar -->
        <div class="sidebar" id="listingsSidebar">
            <a href="add-listing.html" class="add-listing-button">+ Add Listing</a>
            <!-- Listing cards injected here dynamically -->
        </div>
    </div>
 
    <!-- Modal for listing details -->
    <div id="listingModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <div id="modalContent"></div>
            <div id="modalMap" style="height: 300px; width: 100%; margin-top: 20px;"></div>
        </div>
    </div>
 
    <script>
    async function initMap() {
        let userCity = { lat: 33.4484, lng: -112.0740 }; // Default: Phoenix, AZ
 
        // Try to center map on logged-in user's city
        const email = localStorage.getItem('userEmail');
        try {
            if (email) {
                const userResponse = await fetch(`/user-info?email=${encodeURIComponent(email)}`);
                if (userResponse.ok) {
                    const userData = await userResponse.json();
                    if (userData.latitude && userData.longitude) {
                        userCity = { lat: userData.latitude, lng: userData.longitude };
                    }
                }
            }
 
            const map = new google.maps.Map(document.getElementById("map"), {
                center: userCity,
                zoom: 10,
            });
 
            let activeMarker  = null;
            let activePolygon = null;
            let activePins    = [];
 
            // ─── Fetch & Render Listings ────────────────────────────────────────
            const response = await fetch('/listings');
            if (!response.ok) throw new Error(`Network error: ${response.status}`);
 
            const listings = await response.json();
            console.log('Fetched listings:', listings);
 
            if (listings.length === 0) {
                console.warn('No listings found.');
            } else {
                listings.forEach(listing => {
                    if (!listing.latitude || !listing.longitude) {
                        console.warn('Listing missing coordinates:', listing);
                        return;
                    }
 
                    // ── ROUTE or BUSINESS listing ────────────────────────────
                    if (listing.listingType === 'route' || listing.listingType === 'business') {
                        if (!listing.addresses || listing.addresses.length === 0) return;
 
                        // Add random offsets to each address point
                        const points = listing.addresses.map(addr => ({
                            lat: addr.latitude  + (Math.random() - 0.5) * 0.002,
                            lng: addr.longitude + (Math.random() - 0.5) * 0.002
                        }));
 
                        // Filter out addresses more than 3 miles from their nearest neighbor
                        const filteredPoints = points.filter(point =>
                            points.some(other => {
                                if (point === other) return false;
                                const dist = google.maps.geometry.spherical.computeDistanceBetween(
                                    new google.maps.LatLng(point.lat, point.lng),
                                    new google.maps.LatLng(other.lat, other.lng)
                                );
                                return dist <= 4828.03; // 3 miles in meters
                            })
                        );
 
                        // Identify outlier addresses (beyond 3 miles)
                        const outliers = listing.addresses.filter(addr =>
                            !filteredPoints.some(point => {
                                const dist = google.maps.geometry.spherical.computeDistanceBetween(
                                    new google.maps.LatLng(addr.latitude, addr.longitude),
                                    new google.maps.LatLng(point.lat, point.lng)
                                );
                                return dist <= 4828.03;
                            })
                        );
 
                        // Expand each filtered point by 1/3 mile buffer
                        const expandedPoints = filteredPoints.flatMap(pt =>
                            createBufferAroundPoint(pt, 0.5334)
                        );
 
                        // Build smooth convex hull polygon around all expanded points
                        const hullPoints = calculateSmoothHull(expandedPoints);
 
                        const bubblePolygon = new google.maps.Polygon({
                            paths:          hullPoints,
                            strokeColor:    "#4CAF50",
                            strokeOpacity:  0.8,
                            strokeWeight:   2,
                            fillColor:      "#4CAF50",
                            fillOpacity:    0.35,
                            map,
                        });
 
                        // ── Count overlay (number of stops) ─────────────────
                        const polygonCenter = hullPoints.reduce(
                            (acc, p) => { acc.lat += p.lat; acc.lng += p.lng; return acc; },
                            { lat: 0, lng: 0 }
                        );
                        polygonCenter.lat /= hullPoints.length;
                        polygonCenter.lng /= hullPoints.length;
 
                        const countDiv = document.createElement('div');
                        countDiv.style.cssText = 'position:absolute;font-weight:bold;color:#000;pointer-events:none;padding:2px 5px;border-radius:3px;';
                        countDiv.innerText = `${listing.addresses.length}`;
 
                        const countOverlay = new google.maps.OverlayView();
                        countOverlay.onAdd = function () {
                            this.getPanes().overlayLayer.appendChild(countDiv);
                        };
                        countOverlay.draw = function () {
                            const proj = this.getProjection();
                            const pos  = proj.fromLatLngToDivPixel(
                                new google.maps.LatLng(polygonCenter.lat, polygonCenter.lng)
                            );
                            const bounds   = new google.maps.LatLngBounds();
                            hullPoints.forEach(p => bounds.extend(new google.maps.LatLng(p.lat, p.lng)));
                            const tr = proj.fromLatLngToDivPixel(bounds.getNorthEast());
                            const bl = proj.fromLatLngToDivPixel(bounds.getSouthWest());
                            const boxW = Math.abs(tr.x - bl.x);
                            const boxH = Math.abs(tr.y - bl.y);
                            const fontSize = Math.max(12, Math.min(24, Math.min(boxW, boxH) / 4));
                            countDiv.style.fontSize = `${fontSize}px`;
                            countDiv.style.left = `${pos.x - countDiv.offsetWidth / 2}px`;
                            countDiv.style.top  = `${pos.y - countDiv.offsetHeight / 2}px`;
                        };
                        countOverlay.onRemove = function () {
                            if (countDiv.parentNode) countDiv.parentNode.removeChild(countDiv);
                        };
                        countOverlay.setMap(map);
 
                        // ── Asterisk overlay for outliers ────────────────────
                        if (outliers.length > 0) {
                            const topRightEdge = hullPoints.reduce(
                                (best, p) => (p.lat > best.lat || (p.lat === best.lat && p.lng > best.lng) ? p : best),
                                { lat: -90, lng: -180 }
                            );
 
                            const asteriskDiv = document.createElement('div');
                            asteriskDiv.innerHTML = '*';
                            asteriskDiv.style.cssText = 'position:absolute;font-size:24px;font-weight:bold;color:#FF0000;cursor:pointer;z-index:999;padding:4px;border-radius:3px;';
                            asteriskDiv.addEventListener('click', e => {
                                e.stopPropagation();
                                alert('This listing includes locations that are more than 3 miles away from the nearest location. To maintain clarity these outliers are excluded from the shape design.');
                            });
 
                            const asteriskOverlay = new google.maps.OverlayView();
                            asteriskOverlay.onAdd = function () {
                                this.getPanes().overlayMouseTarget.appendChild(asteriskDiv);
                            };
                            asteriskOverlay.draw = function () {
                                const proj = this.getProjection();
                                const pos  = proj.fromLatLngToDivPixel(
                                    new google.maps.LatLng(topRightEdge.lat, topRightEdge.lng)
                                );
                                asteriskDiv.style.left = `${pos.x - asteriskDiv.offsetWidth / 2}px`;
                                asteriskDiv.style.top  = `${pos.y - asteriskDiv.offsetHeight / 2}px`;
                            };
                            asteriskOverlay.onRemove = function () {
                                if (asteriskDiv.parentNode) asteriskDiv.parentNode.removeChild(asteriskDiv);
                            };
                            asteriskOverlay.setMap(map);
                        }
 
                        // ── Polygon click: highlight + show individual pins ──
                        google.maps.event.addListener(bubblePolygon, 'click', () => {
                            if (activePolygon !== bubblePolygon) resetActiveElements();
 
                            bubblePolygon.setOptions({ strokeColor: "#FF0000" });
                            activePolygon = bubblePolygon;
 
                            if (activePins.length === 0) {
                                listing.addresses.forEach(addr => {
                                    const position = {
                                        lat: addr.latitude  + (Math.random() - 0.5) * 0.004,
                                        lng: addr.longitude + (Math.random() - 0.5) * 0.004,
                                    };
                                    const marker = new google.maps.Marker({
                                        position,
                                        map,
                                        title: "Listing Address",
                                        icon:  'http://maps.google.com/mapfiles/ms/icons/red-dot.png',
                                    });
                                    activePins.push(marker);
                                    marker.addListener('click', () => showListingModal(listing, map));
                                });
                            }
 
                            showListingModal(listing, map);
                        });
 
                    // ── INDIVIDUAL listing ───────────────────────────────────
                    } else if (listing.listingType === 'individual') {
                        const position = {
                            lat: listing.latitude  + (Math.random() - 0.5) * 0.004,
                            lng: listing.longitude + (Math.random() - 0.5) * 0.004,
                        };
 
                        const marker = new google.maps.Marker({
                            position,
                            map,
                            title: listing.listingType,
                            icon:  'http://maps.google.com/mapfiles/ms/icons/blue-dot.png',
                        });
 
                        marker.addListener('click', () => {
                            if (activeMarker || activePolygon) resetActiveElements();
                            marker.setIcon('http://maps.google.com/mapfiles/ms/icons/red-dot.png');
                            map.setCenter(marker.getPosition());
                            map.setZoom(12);
                            activeMarker = marker;
                            showListingModal(listing, map);
                        });
 
                        // Sidebar card
                        const listingElement = document.createElement('div');
                        listingElement.classList.add('listing');
                        listingElement.innerHTML = `
                            <img src="${listing.photos ? listing.photos[0] : 'default-image.jpg'}" alt="Listing Photo" class="listing-photo">
                            <div class="listing-title">Single Stop</div>
                            <div class="listing-price">
                                ${listing.askingPrice    ? `Price: $${Math.round(listing.askingPrice).toLocaleString()}` : 'Price not available'},
                                ${listing.monthlyIncome  ? `Inc.: $${Math.round(listing.monthlyIncome).toLocaleString()}/mo` : 'Income N/A'}
                            </div>
                            <div class="listing-address">${listing.city}, ${listing.state} ${listing.zipCode}</div>
                        `;
 
                        // Heart (favorite) icon
                        const heartIcon = createHeartIcon(listing.isFavorited, listing.id);
                        listingElement.querySelector('.listing-title').appendChild(heartIcon);
 
                        document.getElementById('listingsSidebar').appendChild(listingElement);
 
                        listingElement.addEventListener('click', () => {
                            if (activeMarker || activePolygon) resetActiveElements();
                            marker.setIcon('http://maps.google.com/mapfiles/ms/icons/red-dot.png');
                            map.setCenter(marker.getPosition());
                            map.setZoom(12);
                            activeMarker = marker;
                            showListingModal(listing, map);
                        });
                    }
                });
            }
 
            // ── Close modal handlers ─────────────────────────────────────────
            document.querySelector('.close-button').addEventListener('click', () => {
                document.getElementById('listingModal').style.display = "none";
            });
            window.addEventListener('click', e => {
                if (e.target === document.getElementById('listingModal')) {
                    document.getElementById('listingModal').style.display = "none";
                }
            });
 
            // ─── Helper: reset active map elements ──────────────────────────
            function resetActiveElements() {
                if (activeMarker instanceof google.maps.Marker) {
                    activeMarker.setIcon('http://maps.google.com/mapfiles/ms/icons/blue-dot.png');
                }
                if (activePolygon) {
                    activePolygon.setOptions({ strokeColor: "#4CAF50" });
                }
                activePins.forEach(pin => pin.setMap(null));
                activePins    = [];
                activeMarker  = null;
                activePolygon = null;
            }
 
            // ─── Buffer: circle of points around a lat/lng ──────────────────
            function createBufferAroundPoint(point, radiusInKm) {
                const numPoints      = 36;
                const earthRadiusKm  = 6371;
                const points         = [];
                for (let i = 0; i < numPoints; i++) {
                    const angle   = (i * 360) / numPoints;
                    const latOff  = (radiusInKm / earthRadiusKm) * (180 / Math.PI) * Math.cos(angle * Math.PI / 180);
                    const lngOff  = (radiusInKm / earthRadiusKm) * (180 / Math.PI) * (Math.sin(angle * Math.PI / 180) / Math.cos(point.lat * Math.PI / 180));
                    points.push({ lat: point.lat + latOff, lng: point.lng + lngOff });
                }
                return points;
            }
 
            // ─── Smooth convex hull ──────────────────────────────────────────
            function calculateSmoothHull(points) {
                return smoothHullPoints(calculateConvexHull(points));
            }
 
            function smoothHullPoints(points) {
                const smooth = [];
                const factor = 5;
                for (let i = 0; i < points.length; i++) {
                    const p1 = points[i];
                    const p2 = points[(i + 1) % points.length];
                    for (let j = 0; j <= factor; j++) {
                        const t = j / factor;
                        smooth.push({ lat: (1 - t) * p1.lat + t * p2.lat, lng: (1 - t) * p1.lng + t * p2.lng });
                    }
                }
                return smooth;
            }
 
            // Jarvis March (Gift Wrapping) convex hull
            function calculateConvexHull(points) {
                if (points.length < 3) return points;
                let hull        = [];
                let pointOnHull = points.reduce((l, p) => (p.lng < l.lng ? p : l), points[0]);
                let endpoint;
                do {
                    hull.push(pointOnHull);
                    endpoint = points[0];
                    for (let i = 1; i < points.length; i++) {
                        if (endpoint === pointOnHull || isLeftTurn(pointOnHull, endpoint, points[i])) {
                            endpoint = points[i];
                        }
                    }
                    pointOnHull = endpoint;
                } while (endpoint !== hull[0]);
                return hull;
            }
 
            function isLeftTurn(a, b, c) {
                return (b.lat - a.lat) * (c.lng - a.lng) - (b.lng - a.lng) * (c.lat - a.lat) > 0;
            }
 
        } catch (error) {
            console.error('Error loading map or listings:', error);
        }
    }
 
    // ─── Show Listing Modal ──────────────────────────────────────────────────
    function showListingModal(listing, map) {
        const modal        = document.getElementById('listingModal');
        const modalContent = document.getElementById('modalContent');
 
        modalContent.innerHTML = `
            <h2>${listing.listingType === 'individual' ? 'Single Stop' : listing.listingType === 'route' ? 'Route' : 'Business'} Listing</h2>
            <p><strong>City:</strong> ${listing.city}</p>
            <p><strong>State:</strong> ${listing.state}</p>
            <p><strong>Zip Code:</strong> ${listing.zipCode}</p>
            <p><strong>Monthly Income:</strong> ${listing.monthlyIncome ? '$' + Math.round(listing.monthlyIncome).toLocaleString() : 'Not available'}</p>
            <p><strong>Asking Price:</strong> ${listing.askingPrice ? '$' + Math.round(listing.askingPrice).toLocaleString() : 'Not available'}</p>
            <div class="photos-container">
                ${listing.photos ? listing.photos.map(p => `<img src="${p}" alt="Listing Photo">`).join('') : '<p>No photos available</p>'}
            </div>
            <button class="message-button">Message Seller</button>
            <div class="seller-info">
                <img src="${listing.profileImage || 'default-profile.png'}" alt="Seller">
                <p>${listing.sellerName || 'Unknown Seller'}</p>
            </div>
        `;
 
        // Mini-map inside modal
        const modalMap = new google.maps.Map(document.getElementById('modalMap'), {
            center: { lat: listing.latitude, lng: listing.longitude },
            zoom: 13,
        });
 
        if (listing.listingType === 'individual') {
            const pos = {
                lat: listing.latitude  + (Math.random() - 0.5) * 0.004,
                lng: listing.longitude + (Math.random() - 0.5) * 0.004,
            };
            new google.maps.Marker({ position: pos, map: modalMap, title: "Listing" });
            modalMap.setCenter(pos);
        } else if (listing.addresses && listing.addresses.length > 0) {
            const bounds = new google.maps.LatLngBounds();
            listing.addresses.forEach(addr => {
                const pos = {
                    lat: addr.latitude  + (Math.random() - 0.5) * 0.004,
                    lng: addr.longitude + (Math.random() - 0.5) * 0.004,
                };
                const m = new google.maps.Marker({ position: pos, map: modalMap });
                bounds.extend(m.getPosition());
            });
            modalMap.fitBounds(bounds);
        }
 
        modal.style.display = "block";
    }
 
    // ─── Heart / Favorite Icon ───────────────────────────────────────────────
    function createHeartIcon(isFavorited, listingId) {
        const heart = document.createElement('i');
        heart.className = isFavorited ? 'fas fa-heart' : 'far fa-heart';
        heart.style.cssText = 'cursor:pointer;margin-left:8px;color:#e74c3c;';
        heart.addEventListener('click', async e => {
            e.stopPropagation();
            const newState = !heart.classList.contains('fas');
            heart.className = newState ? 'fas fa-heart' : 'far fa-heart';
 
            // Update localStorage
            let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
            if (newState) {
                if (!favorites.includes(listingId)) favorites.push(listingId);
            } else {
                favorites = favorites.filter(id => id !== listingId);
            }
            localStorage.setItem('favorites', JSON.stringify(favorites));
 
            try {
                const res = await fetch('/favorites', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ listingId, isFavorited: newState }),
                });
                if (!res.ok) throw new Error('Failed to update favorite');
            } catch (err) {
                console.error('Favorite update error:', err);
                // Revert on error
                heart.className = newState ? 'far fa-heart' : 'fas fa-heart';
            }
        });
        return heart;
    }
 
    window.initMap = initMap;
    </script>
 
    <!-- ⚠️ IMPORTANT: Restrict this API key to your domain in Google Cloud Console -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC9ZitQS8DlSHi6PGhsSmFglAmoAcMDQUc&callback=initMap&libraries=geometry" async defer></script>
</body>
</html>
