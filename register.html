<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register for Pool Marketplace</title>
    <script src="app.js" defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        header {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            text-align: center;
        }

        main {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: auto;
            position: relative;
        }

        label {
            display: block;
            margin: 10px 0 5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="password"],
        select {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: #45a049;
        }

        .required-field {
            color: red;
            margin-left: 5px;
        }

        .signin-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #4CAF50;
            text-decoration: none;
        }

        .signin-link:hover {
            text-decoration: underline;
        }

        .password-container {
            position: relative;
            margin-bottom: 10px;
        }

        .password-criteria {
            display: none; /* Hide by default */
            font-size: 0.9em;
            padding: 10px;
            background-color: #f0f0f0; /* Light grey background */
            border-radius: 4px;
            width: 250px; /* Fixed width for criteria box */
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
            position: absolute;
            right: -300px; /* Position off to the right side of the form */
            top: 0; /* Align it to the same vertical level as the password field */
        }

        .criteria {
            color: red; /* Default color for unsatisfied criteria */
        }

        .satisfied {
            color: green; /* Color for satisfied criteria */
        }
    </style>
</head>
<body>
    <header>
        <h1>Register for Pool Marketplace</h1>
        <nav>
            <a href="index.html" style="color: white; margin: 0 10px;">Home</a>
            <a href="login.html" style="color: white; margin: 0 10px;">Login</a>
        </nav>
    </header>
    <main>
        <form id="registerForm">
            <label for="fullName">Full Name <span class="required-field">*</span></label>
            <input type="text" id="fullName" name="fullName" required />

            <label for="businessName">Business Name (optional)</label>
            <input type="text" id="businessName" name="businessName" />

            <label for="email">Email (Username) <span class="required-field">*</span></label>
            <input type="email" id="email" name="email" required />

            <label for="phone">Phone <span class="required-field">*</span></label>
            <input type="text" id="phone" name="phone" required placeholder="999-999-9999" oninput="formatPhone(this)" />

            <label for="city">City <span class="required-field">*</span></label>
            <input type="text" id="city" name="city" required />

            <label for="state">State <span class="required-field">*</span></label>
            <select id="state" name="state" required>
                <option value="">Select a state</option>
                <option value="AL">Alabama</option>
                <option value="AK">Alaska</option>
                <option value="AZ">Arizona</option>
                <option value="AR">Arkansas</option>
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="CT">Connecticut</option>
                <option value="DE">Delaware</option>
                <option value="FL">Florida</option>
                <option value="GA">Georgia</option>
                <option value="HI">Hawaii</option>
                <option value="ID">Idaho</option>
                <option value="IL">Illinois</option>
                <option value="IN">Indiana</option>
                <option value="IA">Iowa</option>
                <option value="KS">Kansas</option>
                <option value="KY">Kentucky</option>
                <option value="LA">Louisiana</option>
                <option value="ME">Maine</option>
                <option value="MD">Maryland</option>
                <option value="MA">Massachusetts</option>
                <option value="MI">Michigan</option>
                <option value="MN">Minnesota</option>
                <option value="MS">Mississippi</option>
                <option value="MO">Missouri</option>
                <option value="MT">Montana</option>
                <option value="NE">Nebraska</option>
                <option value="NV">Nevada</option>
                <option value="NH">New Hampshire</option>
                <option value="NJ">New Jersey</option>
                <option value="NM">New Mexico</option>
                <option value="NY">New York</option>
                <option value="NC">North Carolina</option>
                <option value="ND">North Dakota</option>
                <option value="OH">Ohio</option>
                <option value="OK">Oklahoma</option>
                <option value="OR">Oregon</option>
                <option value="PA">Pennsylvania</option>
                <option value="RI">Rhode Island</option>
                <option value="SC">South Carolina</option>
                <option value="SD">South Dakota</option>
                <option value="TN">Tennessee</option>
                <option value="TX">Texas</option>
                <option value="UT">Utah</option>
                <option value="VT">Vermont</option>
                <option value="VA">Virginia</option>
                <option value="WA">Washington</option>
                <option value="WV">West Virginia</option>
                <option value="WI">Wisconsin</option>
                <option value="WY">Wyoming</option>
            </select>

            <label for="password">Password <span class="required-field">*</span></label>
            <input type="password" id="password" name="password" required onfocus="showCriteria()" onblur="hideCriteria()" oninput="validatePassword(this)" />

            <div class="password-criteria" id="passwordCriteria">
                <div id="length" class="criteria">8-12 Characters long</div>
                <div id="uppercase" class="criteria">1 Upper Case Letter</div>
                <div id="lowercase" class="criteria">1 Lower Case Letter</div>
                <div id="number" class="criteria">1 Number</div>
                <div id="special" class="criteria">1 Special Character</div>
            </div>

            <button type="submit">Register</button>
            <a href="login.html" class="signin-link">Already Have an Account? Sign in</a>
        </form>
    </main>
    <script>
        // Function to format phone number as the user types
        function formatPhone(input) {
            const digits = input.value.replace(/\D/g, '');
            let formatted = '';

            if (digits.length > 0) {
                formatted += digits.substring(0, 3); // First 3 digits
            }
            if (digits.length >= 4) {
                formatted += '-' + digits.substring(3, 6); // Next 3 digits
            }
            if (digits.length >= 7) {
                formatted += '-' + digits.substring(6, 10); // Last 4 digits
            }

            input.value = formatted;
        }

        // Function to show password criteria when the input is focused
        function showCriteria() {
            document.getElementById('passwordCriteria').style.display = 'block';
        }

        // Function to hide password criteria when the input loses focus
        function hideCriteria() {
            document.getElementById('passwordCriteria').style.display = 'none';
        }

        // Function to validate password criteria
        function validatePassword(input) {
            const password = input.value;

            // Password criteria
            const lengthCriteria = password.length >= 8 && password.length <= 12;
            const uppercaseCriteria = /[A-Z]/.test(password);
            const lowercaseCriteria = /[a-z]/.test(password);
            const numberCriteria = /[0-9]/.test(password);
            const specialCriteria = /[!@#$%^&*(),.?":{}|<>]/.test(password);

            // Update criteria display based on validation
            document.getElementById('length').className = lengthCriteria ? 'criteria satisfied' : 'criteria';
            document.getElementById('uppercase').className = uppercaseCriteria ? 'criteria satisfied' : 'criteria';
            document.getElementById('lowercase').className = lowercaseCriteria ? 'criteria satisfied' : 'criteria';
            document.getElementById('number').className = numberCriteria ? 'criteria satisfied' : 'criteria';
            document.getElementById('special').className = specialCriteria ? 'criteria satisfied' : 'criteria';
        }

        // Redirect to login page after successful registration
        document.getElementById('registerForm').addEventListener('submit', async function(event) {
    event.preventDefault(); // Prevent default form submission

    const formData = new FormData(event.target);
    const userData = {};
    formData.forEach((value, key) => {
        userData[key] = value;
    });

    try {
        const response = await fetch('/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(userData)
        });

        if (response.ok) {
            alert('User registered successfully! Redirecting to login page...');
            window.location.href = 'login.html';
        } else {
            const errorMessage = await response.text();
            alert('Registration failed: ' + errorMessage);
        }
    } catch (error) {
        alert('An error occurred: ' + error.message);
    }
});

    </script>
</body>
</html>
