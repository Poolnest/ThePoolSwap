<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to Pool Marketplace</title>
    <link rel="stylesheet" href="styles.css">
    <script src="login.js" defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        header {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            text-align: center;
        }

        main {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            margin: auto;
        }

        label {
            display: block;
            margin: 10px 0 5px;
        }

        input[type="email"],
        input[type="password"] {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: #45a049;
        }

        .forgot-password,
        .signup-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #4CAF50;
            text-decoration: none;
        }

        .forgot-password:hover,
        .signup-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>Login to Pool Marketplace</h1>
        <nav>
            <a href="index.html" style="color: white; margin: 0 10px;">Home</a>
            <a href="register.html" style="color: white; margin: 0 10px;">Register</a>
        </nav>
    </header>
    <main>
        <form id="loginForm">
            <label for="email">Email (Username)</label>
            <input type="email" id="email" name="email" required />

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required />

            <button type="submit">Login</button>
            <a href="forgot-password.html" class="forgot-password">Forgot Password?</a>
            <a href="register.html" class="signup-link">Need to Sign up? Click Here</a>
        </form>
    </main>
</body>
</html>
