<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorites</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="app.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <header>
        <h1> Your Favorites</h1>
    </header>
    <nav>
        <a href="dashboard.html">Marketplace</a>
		<a href="add-listing.html">Sell</a>
        <a href="favorites.html">Favorites</a>
        <a href="messages.html">Messages</a>
		<a href="donate.html">Donate</a>
        <a href="account.html">Account</a>
    </nav>
    </header>
    <main>
        <h2>Your Favorite Listings</h2>
        <div class="favorite-listings" id="favoriteListings">
            <!-- Favorite listings will be populated here dynamically -->
        </div>
    </main>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
    const favorites = JSON.parse(localStorage.getItem('favorites')) || [];
    const response = await fetch('/listings');
    const listings = await response.json();
    const favoriteListings = listings.filter(listing => favorites.includes(listing.id));

    const favoritesContainer = document.getElementById('favoritesContainer');
    favoriteListings.forEach(listing => {
        const listingElement = document.createElement('div');
        listingElement.classList.add('favorite-listing');
        listingElement.innerHTML = `
            <img src="${listing.photos ? listing.photos[0] : 'default-image.jpg'}" alt="Listing Photo">
            <h3>${listing.title || 'Listing'}</h3>
            <p>${listing.city}, ${listing.state}</p>
            <p>Sale Price: ${listing.askingPrice ? `$${listing.askingPrice}` : 'Price not available'}</p>
            <p>Inc.: ${listing.monthlyIncome ? `$${listing.monthlyIncome}/month` : 'Income not available'}</p>
        `;
        favoritesContainer.appendChild(listingElement);
    });
});

</script>

</body>
</html>
