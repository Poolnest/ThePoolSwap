<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Pool Marketplace</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        header {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            text-align: center;
        }

        main {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            margin: auto;
        }

        label {
            display: block;
            margin: 10px 0 5px;
        }

        input[type="email"] {
            width: calc(100% - 20px); /* Full width with padding */
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Include padding in width */
        }

        button {
            background: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: #45a049;
        }

        .back-to-login {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #4CAF50;
            text-decoration: none;
        }

        .back-to-login:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>Forgot Password</h1>
        <nav>
            <a href="index.html" style="color: white; margin: 0 10px;">Home</a>
            <a href="login.html" style="color: white; margin: 0 10px;">Login</a>
            <a href="register.html" style="color: white; margin: 0 10px;">Register</a>
        </nav>
    </header>
    <main>
        <form id="forgotPasswordForm">
            <label for="email">Enter your email address to reset your password</label>
            <input type="email" id="email" name="email" required placeholder="Your email address" />

            <button type="submit">Send Reset Link</button>
            <a href="login.html" class="back-to-login">Back to Login</a>
        </form>
    </main>
</body>
</html>
